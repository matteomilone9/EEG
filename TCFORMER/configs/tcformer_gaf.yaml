# tcformer_gaf.yaml

# general
dataset_name: "bcic2a_loso_ea"
subject_ids: "all"
max_epochs: 100
max_epochs_2b: 500
max_epochs_loso: 125
max_epochs_loso_hgd: 77
seed: 0

# preprocessing
z_scale: True
interaug: True
preprocessing:
  bcic2a:
    sfreq: 250
    low_cut: null
    high_cut: null
    start: 0.0
    stop: 0.0
    batch_size: 48
    euclidean_alignment: true
  bcic2b:
    sfreq: 250
    low_cut: null
    high_cut: null
    start: 0.0
    stop: -0.5
    batch_size: 48
  bcic3:
    sfreq: 100
    low_cut: 0
    high_cut: 40
    start: 0.0
    stop: 0.0
    batch_size: 28
    channel_selection: True
  reh_mi:
    sfreq: 128
    low_cut: 4
    high_cut: 50
    start: 0.0
    stop: 0.0
    batch_size: 48
  hgd:
    sfreq: 250
    low_cut: 4
    high_cut: null
    start: 0.0
    stop: 0.0
    batch_size: 48
    remove_artifacts: True

# model
model: "TCFormerGAF"
model_kwargs:
  F1: 32
  temp_kernel_lengths: [20, 32, 64]
  d_group: 16
  D: 2
  pool_length_1: 8
  pool_length_2: 7
  dropout_conv: 0.4
  use_group_attn: True

  # Transformer parameters
  q_heads: 4
  kv_heads: 2
  trans_depth: 5
  trans_dropout: 0.4

  # TCN_head parameters
  tcn_depth: 2
  kernel_length_tcn: 4
  dropout_tcn: 0.3

  # Optimizer
  lr: 0.0009
  beta_1: 0.5
  weight_decay: 0.001        # L2 tramite ottimizzatore
  optimizer: "adam"
  scheduler: True
  warmup_epochs: 20
  warmup_epochs_loso: 3

  # GAF distillation
  ae_ckpt_path: null          # null = random init (nuovo approccio)
  gaf_size: 128
  gaf_mode: "both"
  latent_dim: 128
  use_joint_training: true

  # Lambda schedule — parte alto, scende a zero
  lambda_aux: 0.5             # alto nelle prime epoch → GAFEncoder si stabilizza
  lambda_aux_final: 0.0       # scende → TCFormer si concentra sulla classificazione
  use_lambda_schedule: true

  # Elastic Net (L1 + L2)
  l1_lambda: 0.00001          # L1 esplicita sulla loss
