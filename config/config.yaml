# ── Pipeline ViT ──
training_vit:
  window_size: 1000
  stride: 250
  batch_size: 32
  lr: 0.00005
  weight_decay: 0.005
  dropout: 0.3
  epochs: 50
  patience: 15
  gaf_type: "GASF"  #GASF - #GADF
  image_size: 64
  target_size: 224
  freeze_vit: false
  model_name: "vit_small_patch16_224"   #alternativa --> vit_base_patch16_224 ; deit_tiny_patch16_224 ; vit_small_patch16_224
  resume: false

split:
  train: [0, 113000]
  val: [113000, 137000]
  test: [137000, 160000]
