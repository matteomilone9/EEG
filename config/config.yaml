#config
data:
  edf_path: "./data/sub-01_task-motor-imagery_eeg.edf"
  events_path: "./data/task-motor-imagery_events.tsv"
  fs: 500  # frequenza campionamento

preprocessing:
  filter_band: [7, 40]  # mu/beta bands
  filter_order: 4

training:
  window_size: 1000
  stride: 125
  batch_size: 32
  lr: 0.0005
  weight_decay: 0.005
  epochs: 50
  patience: 15
  resume: true
  label_smoothing: 0.1


model:
  name: "EEGNet"  #
#  name: "SimpleEEGNet"
  n_channels: 29   #31
  n_classes: 2

# ── Pipeline spettrogramma
training_spectrogram:
  window_size: 1000   # 2 secondi → più risoluzione tempo-frequenza
  stride: 250
  batch_size: 32
  lr: 0.0005
  weight_decay: 0.005
  epochs: 50
  patience: 10

## ── Pipeline GAF (GAFNet) ──
